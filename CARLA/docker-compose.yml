name: ub-carla

x-redis-env: &redis-env
  PYTHONUNBUFFERED: "1"
  UB_REDIS_HOST: ${UB_REDIS_HOST:-127.0.0.1}
  UB_REDIS_PORT: ${UB_REDIS_PORT:-6390}
  UB_REDIS_PASSWORD: ${UB_REDIS_PASSWORD:-password}
  UB_REDIS_CHANNEL: ${UB_REDIS_CHANNEL:-carla:telemetry}

x-carla-env: &carla-env
  UB_CARLA_HOST: ${UB_CARLA_HOST:-127.0.0.1}
  UB_CARLA_PORT: ${UB_CARLA_PORT:-2000}

x-ros-dds-env: &ros-dds-env
  RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
  CYCLONEDDS_URI: '<CycloneDDS><Domain Id="any"><General><Interfaces><NetworkInterface autodetermine="false" name="lo" priority="default" multicast="default" /></Interfaces><AllowMulticast>default</AllowMulticast><MaxMessageSize>65500B</MaxMessageSize></General></Domain></CycloneDDS>'

x-redis-client-base: &redis-client-base
  image: ${REDIS_CLIENT_IMAGE:-ub-carla-redis-networking}
  build:
    context: ./UB-API/redis-networking
    dockerfile: Dockerfile
  network_mode: host
  depends_on:
    redis:
      condition: service_started
    map-loader:
      condition: service_completed_successfully
  volumes:
    - ./Builds/${BUILD_FOLDER:-v1.0.0}:/carla:ro
  environment:
    <<: [*redis-env, *carla-env, *ros-dds-env]
    PYTHONUNBUFFERED: "1"
    CARLA_PYTHON_TARGET: /tmp/ub-carla-python-${BUILD_FOLDER:-v1.0.0}

services:
  carla:
    image: ${IMAGE_NAME:-ub-carla}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_NAME:-ub-carla-container}
    network_mode: host
    runtime: nvidia
    environment:
      <<: [*carla-env, *ros-dds-env]
      DISPLAY: ${DISPLAY:-}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./Builds/${BUILD_FOLDER:-v1.0.0}:/carla:rw
    entrypoint:
      - /bin/bash
      - -lc
    command:
      - exec /carla/CarlaUE4.sh ${CARLA_ARGS:--prefernvidia -quality-level=Low -nosound}

  map-loader:
    image: ${IMAGE_NAME:-ub-carla}
    network_mode: host
    depends_on:
      carla:
        condition: service_started
    entrypoint:
      - /bin/bash
      - /tmp/compose-map-loader.sh
    environment:
      <<: [*carla-env, *ros-dds-env]
      CARLA_MAP_PATH: ${CARLA_MAP_PATH-/Game/Carla/Maps/UBAutonomousProvingGrounds}
      CARLA_PYTHON_TARGET: /tmp/ub-carla-python-${BUILD_FOLDER:-v1.0.0}
    volumes:
      - ./Builds/${BUILD_FOLDER:-v1.0.0}:/carla:ro
      - ./compose-map-loader.sh:/tmp/compose-map-loader.sh:ro
    restart: "no"

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: ${REDIS_CONTAINER_NAME:-ub-carla-redis}
    network_mode: host
    command:
      - redis-server
      - --bind
      - ${UB_REDIS_HOST:-127.0.0.1}
      - --port
      - "${UB_REDIS_PORT:-6390}"
      - --requirepass
      - ${UB_REDIS_PASSWORD:-password}

  traffic-publisher:
    <<: *redis-client-base
    container_name: ${TRAFFIC_PUBLISHER_CONTAINER_NAME:-ub-carla-traffic-publisher}
    profiles:
      - traffic-publisher
      - ub-mr
    environment:
      <<: [*redis-env, *carla-env, *ros-dds-env]
      UB_REDIS_ROLE: traffic-publisher
      UB_CARLA_ASYNC: ${UB_CARLA_ASYNC:-1}
      UB_TRAFFIC_MANAGER_PORT: ${UB_TRAFFIC_MANAGER_PORT:-8001}
      UB_TRAFFIC_NO_RENDERING: ${UB_TRAFFIC_NO_RENDERING:-0}
      UB_TRAFFIC_PUBLISH_HZ: ${UB_TRAFFIC_PUBLISH_HZ:-60}
      UB_MANUAL_ROLE_NAME: ${UB_MANUAL_ROLE_NAME:-manual_vehicle}
      CARLA_PYTHON_TARGET: /tmp/ub-carla-python-${BUILD_FOLDER:-v1.0.0}

  udp-bridge:
    <<: *redis-client-base
    container_name: ${UDP_BRIDGE_CONTAINER_NAME:-ub-carla-udp-bridge}
    profiles:
      - udp-bridge
      - ub-mr
    depends_on:
      redis:
        condition: service_started
      map-loader:
        condition: service_completed_successfully
    environment:
      <<: [*redis-env, *carla-env, *ros-dds-env]
      UB_REDIS_ROLE: udp-bridge
      UB_UNITY_HOST: ${UB_UNITY_HOST:-127.0.0.1}
      UB_UNITY_PORT: ${UB_UNITY_PORT:-12345}
      UB_EGO_LISTEN_HOST: ${UB_EGO_LISTEN_HOST:-0.0.0.0}
      UB_EGO_LISTEN_PORT: ${UB_EGO_LISTEN_PORT:-12346}
      UB_EGO_ID: ${UB_EGO_ID:-ub-mr-ego}
      UB_EGO_BLUEPRINT: ${UB_EGO_BLUEPRINT:-vehicle.lincoln.mkz_2020}
      UB_EGO_COLOR: ${UB_EGO_COLOR:-0,0,255}
      UB_EGO_TIMEOUT: ${UB_EGO_TIMEOUT:-2.0}
      CARLA_PYTHON_TARGET: /tmp/ub-carla-python-${BUILD_FOLDER:-v1.0.0}

  manual-control:
    <<: *redis-client-base
    container_name: ${MANUAL_CONTROL_CONTAINER_NAME:-ub-carla-manual-control}
    profiles:
      - manual-control
    depends_on:
      map-loader:
        condition: service_completed_successfully
    environment:
      <<: [*redis-env, *carla-env, *ros-dds-env]
      UB_REDIS_ROLE: manual-control
      DISPLAY: ${DISPLAY:-}
      XAUTHORITY: /tmp/.docker.xauth
      SDL_VIDEODRIVER: ${SDL_VIDEODRIVER:-x11}
      UB_MANUAL_CARLA_HOST: ${UB_MANUAL_CARLA_HOST:-127.0.0.1}
      UB_MANUAL_CARLA_PORT: ${UB_MANUAL_CARLA_PORT:-2000}
      UB_MANUAL_ROLE_NAME: ${UB_MANUAL_ROLE_NAME:-manual_vehicle}
      UB_MANUAL_BLUEPRINT: ${UB_MANUAL_BLUEPRINT:-vehicle.lincoln.mkz_2020}
      UB_MANUAL_COLOR: ${UB_MANUAL_COLOR:-0,0,255}
      UB_MANUAL_MAX_KMH: ${UB_MANUAL_MAX_KMH:-60}
      UB_MANUAL_FOLLOW_SPECTATOR: ${UB_MANUAL_FOLLOW_SPECTATOR:-0}
      UB_MANUAL_SPAWN_INDEX: ${UB_MANUAL_SPAWN_INDEX:-0}
      UB_MANUAL_ACTOR_REDIS_KEY: ${UB_MANUAL_ACTOR_REDIS_KEY:-carla:manual_control:actor}
      CARLA_PYTHON_TARGET: /tmp/ub-carla-python-${BUILD_FOLDER:-v1.0.0}
    volumes:
      - ./Builds/${BUILD_FOLDER:-v1.0.0}:/carla:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-/tmp/.Xauthority}:/tmp/.docker.xauth:ro

  traffic-renderer:
    <<: *redis-client-base
    container_name: ${TRAFFIC_RENDERER_CONTAINER_NAME:-ub-carla-traffic-renderer}
    profiles:
      - traffic-renderer
    depends_on:
      map-loader:
        condition: service_completed_successfully
    environment:
      <<: [*redis-env, *carla-env, *ros-dds-env]
      UB_REDIS_ROLE: traffic-renderer
      UB_RENDER_CARLA_HOST: ${UB_RENDER_CARLA_HOST:-127.0.0.1}
      UB_RENDER_CARLA_PORT: ${UB_RENDER_CARLA_PORT:-2000}
      UB_RENDER_FOLLOW_ROLE_NAME: ${UB_RENDER_FOLLOW_ROLE_NAME:-${UB_MANUAL_ROLE_NAME:-manual_vehicle}}
      UB_RENDER_FOLLOW_SPECTATOR: ${UB_RENDER_FOLLOW_SPECTATOR:-1}
      UB_RENDER_MANUAL_ACTOR_REDIS_KEY: ${UB_RENDER_MANUAL_ACTOR_REDIS_KEY:-${UB_MANUAL_ACTOR_REDIS_KEY:-carla:manual_control:actor}}
      UB_RENDER_SKIP_LOCAL_IDS: ${UB_RENDER_SKIP_LOCAL_IDS:-0}
      UB_RENDER_INTERPOLATION_DELAY_MS: ${UB_RENDER_INTERPOLATION_DELAY_MS:-125}
      UB_RENDER_MAX_EXTRAPOLATION_MS: ${UB_RENDER_MAX_EXTRAPOLATION_MS:-100}
      UB_RENDER_UPDATE_HZ: ${UB_RENDER_UPDATE_HZ:-60}
      UB_RENDER_ACTOR_SMOOTHING: ${UB_RENDER_ACTOR_SMOOTHING:-0.45}
      UB_RENDER_CAMERA_SMOOTHING: ${UB_RENDER_CAMERA_SMOOTHING:-0.15}
      UB_RENDER_CAMERA_POSITION_DEADBAND_M: ${UB_RENDER_CAMERA_POSITION_DEADBAND_M:-0.10}
      UB_RENDER_CAMERA_YAW_DEADBAND_DEG: ${UB_RENDER_CAMERA_YAW_DEADBAND_DEG:-0.50}
      UB_RENDER_CAMERA_TARGET_SMOOTHING: ${UB_RENDER_CAMERA_TARGET_SMOOTHING:-0.14}
      UB_RENDER_CAMERA_YAW_SMOOTHING: ${UB_RENDER_CAMERA_YAW_SMOOTHING:-0.04}
      UB_RENDER_CAMERA_HIGH_SPEED_DAMPING: ${UB_RENDER_CAMERA_HIGH_SPEED_DAMPING:-1.0}
      UB_RENDER_CAMERA_DISTANCE_M: ${UB_RENDER_CAMERA_DISTANCE_M:-8.0}
      UB_RENDER_CAMERA_HEIGHT_M: ${UB_RENDER_CAMERA_HEIGHT_M:-4.0}
      UB_RENDER_CAMERA_PITCH_DEG: ${UB_RENDER_CAMERA_PITCH_DEG:--15.0}
      UB_RENDER_CAMERA_MODE: ${UB_RENDER_CAMERA_MODE:-continuous}
      CARLA_PYTHON_TARGET: /tmp/ub-carla-python-${BUILD_FOLDER:-v1.0.0}

  camera-follow:
    <<: *redis-client-base
    container_name: ${CAMERA_FOLLOW_CONTAINER_NAME:-ub-carla-camera-follow}
    profiles:
      - camera-follow
    environment:
      <<: [*redis-env, *carla-env, *ros-dds-env]
      UB_REDIS_ROLE: camera-follow
      UB_CAMERA_FOLLOW_HOST: ${UB_AUTOWARE_CAMERA_FOLLOW_HOST:-127.0.0.1}
      UB_CAMERA_FOLLOW_PORT: ${UB_AUTOWARE_CAMERA_FOLLOW_PORT:-2000}
      UB_CAMERA_FOLLOW_ROLE_NAMES: ${UB_AUTOWARE_CAMERA_FOLLOW_ROLE_NAMES:-ego_vehicle,hero,actor,autopilot}
      UB_CAMERA_FOLLOW_WAIT_SECONDS: ${UB_AUTOWARE_CAMERA_FOLLOW_WAIT_SECONDS:-0}
      UB_CAMERA_FOLLOW_DISTANCE_M: ${UB_AUTOWARE_CAMERA_FOLLOW_DISTANCE_M:-8.0}
      UB_CAMERA_FOLLOW_HEIGHT_M: ${UB_AUTOWARE_CAMERA_FOLLOW_HEIGHT_M:-3.0}
      UB_CAMERA_FOLLOW_PITCH_DEG: ${UB_AUTOWARE_CAMERA_FOLLOW_PITCH_DEG:--12.0}
      UB_CAMERA_FOLLOW_UPDATE_HZ: ${UB_AUTOWARE_CAMERA_FOLLOW_UPDATE_HZ:-30.0}
      CARLA_PYTHON_TARGET: /tmp/ub-carla-python-${BUILD_FOLDER:-v1.0.0}
    volumes:
      - ./Builds/${BUILD_FOLDER:-v1.0.0}:/carla:ro
      - ./UB-API/util:/opt/ub-carla-util:ro

  multi-agent-renderer:
    <<: *redis-client-base
    container_name: ${MULTI_AGENT_RENDERER_CONTAINER_NAME:-ub-carla-multi-agent-renderer}
    profiles:
      - multi-agent-renderer
    environment:
      <<: [*redis-env, *carla-env, *ros-dds-env]
      UB_REDIS_ROLE: multi-agent-renderer
      CARLA_PYTHON_TARGET: /tmp/ub-carla-python-${BUILD_FOLDER:-v1.0.0}
