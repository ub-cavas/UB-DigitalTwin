name: ub-carla

x-redis-env: &redis-env
  UB_REDIS_HOST: ${UB_REDIS_HOST:-127.0.0.1}
  UB_REDIS_PORT: ${UB_REDIS_PORT:-6390}
  UB_REDIS_PASSWORD: ${UB_REDIS_PASSWORD:-password}
  UB_REDIS_CHANNEL: ${UB_REDIS_CHANNEL:-carla:telemetry}

x-carla-env: &carla-env
  UB_CARLA_HOST: ${UB_CARLA_HOST:-127.0.0.1}
  UB_CARLA_PORT: ${UB_CARLA_PORT:-2000}

x-redis-client-base: &redis-client-base
  image: ${REDIS_CLIENT_IMAGE:-ub-carla-redis-networking}
  build:
    context: ./UB-API/redis-networking
    dockerfile: Dockerfile
  network_mode: host
  depends_on:
    redis:
      condition: service_started
    map-loader:
      condition: service_completed_successfully
  volumes:
    - ./Builds/${BUILD_FOLDER:-v1.0.0}:/carla:ro
  environment:
    <<: [*redis-env, *carla-env]
    CARLA_PYTHON_TARGET: /tmp/ub-carla-python-${BUILD_FOLDER:-v1.0.0}

services:
  carla:
    image: ${IMAGE_NAME:-ub-carla}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_NAME:-ub-carla-container}
    network_mode: host
    runtime: nvidia
    environment:
      DISPLAY: ${DISPLAY:-}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./Builds/${BUILD_FOLDER:-v1.0.0}:/carla:rw
    entrypoint:
      - /bin/bash
      - -lc
    command:
      - exec /carla/CarlaUE4.sh ${CARLA_ARGS:--prefernvidia -quality-level=Low -nosound}

  map-loader:
    image: ${IMAGE_NAME:-ub-carla}
    network_mode: host
    depends_on:
      carla:
        condition: service_started
    entrypoint:
      - /bin/bash
      - /tmp/compose-map-loader.sh
    environment:
      <<: *carla-env
      CARLA_MAP_PATH: ${CARLA_MAP_PATH-/Game/Carla/Maps/UBAutonomousProvingGrounds}
      CARLA_PYTHON_TARGET: /tmp/ub-carla-python-${BUILD_FOLDER:-v1.0.0}
    volumes:
      - ./Builds/${BUILD_FOLDER:-v1.0.0}:/carla:ro
      - ./compose-map-loader.sh:/tmp/compose-map-loader.sh:ro
    restart: "no"

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: ${REDIS_CONTAINER_NAME:-ub-carla-redis}
    network_mode: host
    command:
      - redis-server
      - --bind
      - ${UB_REDIS_HOST:-127.0.0.1}
      - --port
      - "${UB_REDIS_PORT:-6390}"
      - --requirepass
      - ${UB_REDIS_PASSWORD:-password}

  traffic-publisher:
    <<: *redis-client-base
    container_name: ${TRAFFIC_PUBLISHER_CONTAINER_NAME:-ub-carla-traffic-publisher}
    profiles:
      - traffic-publisher
      - ub-mr
    environment:
      <<: [*redis-env, *carla-env]
      UB_REDIS_ROLE: traffic-publisher
      UB_CARLA_ASYNC: ${UB_CARLA_ASYNC:-1}
      CARLA_PYTHON_TARGET: /tmp/ub-carla-python-${BUILD_FOLDER:-v1.0.0}

  udp-bridge:
    <<: *redis-client-base
    container_name: ${UDP_BRIDGE_CONTAINER_NAME:-ub-carla-udp-bridge}
    profiles:
      - udp-bridge
      - ub-mr
    depends_on:
      redis:
        condition: service_started
      map-loader:
        condition: service_completed_successfully
    environment:
      <<: [*redis-env, *carla-env]
      UB_REDIS_ROLE: udp-bridge
      UB_UNITY_HOST: ${UB_UNITY_HOST:-127.0.0.1}
      UB_UNITY_PORT: ${UB_UNITY_PORT:-12345}
      UB_EGO_LISTEN_HOST: ${UB_EGO_LISTEN_HOST:-0.0.0.0}
      UB_EGO_LISTEN_PORT: ${UB_EGO_LISTEN_PORT:-12346}
      UB_EGO_ID: ${UB_EGO_ID:-ub-mr-ego}
      UB_EGO_BLUEPRINT: ${UB_EGO_BLUEPRINT:-vehicle.lincoln.mkz_2020}
      UB_EGO_COLOR: ${UB_EGO_COLOR:-0,0,255}
      UB_EGO_TIMEOUT: ${UB_EGO_TIMEOUT:-2.0}
      CARLA_PYTHON_TARGET: /tmp/ub-carla-python-${BUILD_FOLDER:-v1.0.0}

  traffic-renderer:
    <<: *redis-client-base
    container_name: ${TRAFFIC_RENDERER_CONTAINER_NAME:-ub-carla-traffic-renderer}
    profiles:
      - traffic-renderer
    environment:
      <<: [*redis-env, *carla-env]
      UB_REDIS_ROLE: traffic-renderer
      CARLA_PYTHON_TARGET: /tmp/ub-carla-python-${BUILD_FOLDER:-v1.0.0}

  multi-agent-renderer:
    <<: *redis-client-base
    container_name: ${MULTI_AGENT_RENDERER_CONTAINER_NAME:-ub-carla-multi-agent-renderer}
    profiles:
      - multi-agent-renderer
    environment:
      <<: [*redis-env, *carla-env]
      UB_REDIS_ROLE: multi-agent-renderer
      CARLA_PYTHON_TARGET: /tmp/ub-carla-python-${BUILD_FOLDER:-v1.0.0}
